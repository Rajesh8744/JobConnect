<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>JobConnect – Find Your Dream Job | Job Portal</title>
    <meta name="description" content="JobConnect is a modern job portal where job seekers can discover curated listings from top companies worldwide. Search by title, location, and salary. Register free today!" />
    <meta name="keywords" content="jobs, job portal, job search, careers, employment, hiring, remote jobs, JobConnect, find jobs, job listings" />
    <meta name="author" content="JobConnect" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://job-connect-mocha.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://job-connect-mocha.vercel.app/" />
    <meta property="og:title" content="JobConnect – Find Your Dream Job" />
    <meta property="og:description" content="Discover curated job listings from top companies worldwide. Search, apply, and land your dream job on JobConnect." />
    <meta property="og:site_name" content="JobConnect" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://job-connect-mocha.vercel.app/" />
    <meta name="twitter:title" content="JobConnect – Find Your Dream Job" />
    <meta name="twitter:description" content="Discover curated job listings from top companies worldwide. Search, apply, and land your dream job on JobConnect." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "JobConnect",
      "url": "https://job-connect-mocha.vercel.app/",
      "description": "A modern job portal to find your dream job from top companies worldwide.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://job-connect-mocha.vercel.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
